<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver TAL - Manifest System</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-4 min-h-screen">

    <div class="max-w-md mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100">
        <div class="bg-gradient-to-r from-blue-700 to-blue-500 p-6 text-white text-center">
            <h1 class="text-xl font-black tracking-widest">PT TAL SARANA LOGISTIK</h1>
            <p class="text-[10px] uppercase tracking-tighter opacity-80">Jabodetabek Delivery Tracker</p>
        </div>

        <div class="p-6">
            <div id="page1">
                <h2 class="text-lg font-bold text-gray-800 mb-4 flex items-center">
                    <span class="bg-blue-600 w-2 h-6 rounded mr-2"></span> KEDATANGAN DRIVER
                </h2>
                
                <div class="space-y-5">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">NAMA CUSTOMER (CAPTION) *</label>
                        <input type="text" id="customer" required 
                            class="w-full border-2 border-gray-200 rounded-xl p-3 focus:border-blue-500 outline-none transition-all" 
                            placeholder="Contoh: Toko Berkah / PT ABC">
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">FOTO DENGAN TIMESTAMP *</label>
                        <input type="file" id="fotoMasuk" accept="image/*" capture="camera" 
                            class="w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-blue-50 file:text-blue-700 font-semibold">
                    </div>

                    <div class="grid grid-cols-2 gap-2 bg-gray-50 p-3 rounded-xl border border-dashed border-gray-300">
                        <div>
                            <span class="block text-[10px] text-gray-400">JAM DATANG</span>
                            <input type="text" id="jamMasuk" readonly class="bg-transparent font-bold text-sm text-gray-700 outline-none">
                        </div>
                        <div>
                            <span class="block text-[10px] text-gray-400">KOORDINAT GPS</span>
                            <input type="text" id="lokasiMasuk" readonly class="bg-transparent font-bold text-[10px] text-blue-600 outline-none">
                        </div>
                    </div>

                    <button onclick="keTahap2()" 
                        class="w-full bg-blue-600 hover:bg-blue-800 text-white font-black py-4 rounded-2xl shadow-lg transform active:scale-95 transition-all">
                        MULAI (STATUS: BERLANGSUNG)
                    </button>
                </div>
            </div>

            <div id="page2" class="hidden">
                <h2 class="text-lg font-bold text-gray-800 mb-4 flex items-center">
                    <span class="bg-green-500 w-2 h-6 rounded mr-2"></span> SELESAI TUGAS
                </h2>

                <div class="space-y-5">
                    <div class="bg-blue-50 p-4 rounded-2xl border-l-4 border-blue-500">
                        <p class="text-xs text-blue-600 font-bold">TUJUAN:</p>
                        <p id="labelCust" class="text-lg font-black text-gray-800 uppercase"></p>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">FOTO SELESAI (TIMESTAMP) *</label>
                        <input type="file" id="fotoKeluar" accept="image/*" capture="camera" 
                            class="w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-green-50 file:text-green-700 font-semibold">
                    </div>

                    <button onclick="kirimData()" id="btnKirim"
                        class="w-full bg-green-600 hover:bg-green-800 text-white font-black py-4 rounded-2xl shadow-lg transform active:scale-95 transition-all">
                        UPLOAD KE SPREADSHEET
                    </button>
                </div>
            </div>

            <div id="success" class="hidden text-center py-10">
                <div class="text-6xl mb-4">📦</div>
                <h2 class="text-2xl font-bold text-gray-800">DATA TERKIRIM!</h2>
                <p class="text-sm text-gray-500 mt-2">Manifest berhasil diperbarui di Google Sheets.</p>
                <button onclick="location.reload()" class="mt-8 text-blue-600 font-bold">INPUT BARU</button>
            </div>
        </div>
    </div>

    <script>
        // 1. GANTI INI DENGAN URL DARI GOOGLE APPS SCRIPT
        const SCRIPT_URL = "URL_APPS_SCRIPT_DISINI";

        window.onload = function() {
            updateInfo();
        };

        function updateInfo() {
            const now = new Date();
            document.getElementById('jamMasuk').value = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0') + " WIB";
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    document.getElementById('lokasiMasuk').value = pos.coords.latitude.toFixed(5) + "," + pos.coords.longitude.toFixed(5);
                });
            }
        }

        function keTahap2() {
            const cust = document.getElementById('customer').value;
            const foto = document.getElementById('fotoMasuk').files[0];

            if (!cust || !foto) {
                alert("⚠️ Nama Customer & Foto wajib diisi!");
                return;
            }

            document.getElementById('labelCust').innerText = cust;
            document.getElementById('page1').classList.add('hidden');
            document.getElementById('page2').classList.remove('hidden');
        }

        function kirimData() {
            const foto2 = document.getElementById('fotoKeluar').files[0];
            if (!foto2) return alert("⚠️ Foto Selesai wajib diambil!");

            const btn = document.getElementById('btnKirim');
            btn.innerText = "SEDANG MENGIRIM...";
            btn.disabled = true;

            const now = new Date();
            const data = {
                customer: document.getElementById('customer').value,
                waktu_datang: document.getElementById('jamMasuk').value,
                waktu_selesai: now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0') + " WIB",
                lokasi: document.getElementById('lokasiMasuk').value
            };

            fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify(data)
            })
            .then(() => {
                document.getElementById('page2').classList.add('hidden');
                document.getElementById('success').classList.remove('hidden');
            })
            .catch(() => {
                alert("Gagal koneksi ke Server. Cek URL Script!");
                btn.disabled = false;
                btn.innerText = "UPLOAD KE SPREADSHEET";
            });
        }
    </script>
</body>
</html>
