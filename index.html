<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Manifest - PT TAL SARANA LOGISTIK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .hidden { display: none; }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-white rounded-[2rem] shadow-2xl overflow-hidden border border-slate-200">
        <div class="bg-slate-900 p-8 text-white relative">
            <div class="absolute top-4 right-6 opacity-20 text-4xl">🚚</div>
            <h1 class="text-xl font-extrabold tracking-tight">PT TAL SARANA LOGISTIK</h1>
            <p class="text-xs text-slate-400 font-medium tracking-widest uppercase mt-1">Sistem Manifest Digital</p>
        </div>

        <div class="p-8">
            <div id="page1">
                <div class="mb-8">
                    <h2 class="text-2xl font-bold text-slate-800">Check-In Driver</h2>
                    <p class="text-sm text-slate-500">Silakan lengkapi data kedatangan di lokasi.</p>
                </div>
                
                <div class="space-y-6">
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Nama Customer / Toko *</label>
                        <input type="text" id="customer" required 
                            class="w-full bg-slate-50 border-2 border-slate-100 rounded-xl p-4 focus:border-blue-500 focus:bg-white outline-none transition-all text-slate-700 font-semibold" 
                            placeholder="Contoh: PT. Sumber Makmur">
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Foto Bukti Datang *</label>
                        <div class="relative">
                            <input type="file" id="fotoMasuk" accept="image/*" capture="camera" 
                                class="w-full text-sm text-slate-500 file:mr-4 file:py-3 file:px-6 file:rounded-xl file:border-0 file:text-xs file:font-bold file:bg-blue-600 file:text-white hover:file:bg-blue-700 cursor:pointer">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-3 p-4 bg-slate-50 rounded-2xl border border-slate-100">
                        <div>
                            <span class="block text-[10px] font-bold text-slate-400 uppercase">Waktu</span>
                            <input type="text" id="jamMasuk" readonly class="bg-transparent font-bold text-sm text-slate-700 outline-none w-full">
                        </div>
                        <div>
                            <span class="block text-[10px] font-bold text-slate-400 uppercase">Lokasi GPS</span>
                            <input type="text" id="lokasiMasuk" readonly class="bg-transparent font-bold text-[10px] text-blue-600 outline-none w-full">
                        </div>
                    </div>

                    <button onclick="keTahap2()" 
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-5 rounded-2xl shadow-[0_10px_20px_rgba(37,99,235,0.3)] transition-all transform active:scale-[0.98]">
                        MULAI TUGAS (BERLANGSUNG)
                    </button>
                </div>
            </div>

            <div id="page2" class="hidden">
                <div class="mb-8 text-center">
                    <div class="inline-block px-4 py-1 bg-blue-100 text-blue-700 text-[10px] font-black rounded-full mb-2 uppercase">Status: Berlangsung</div>
                    <h2 id="labelCust" class="text-2xl font-black text-slate-800 truncate uppercase tracking-tight"></h2>
                </div>

                <div class="space-y-6">
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Foto Bukti Selesai *</label>
                        <input type="file" id="fotoKeluar" accept="image/*" capture="camera" 
                            class="w-full text-sm text-slate-500 file:mr-4 file:py-3 file:px-6 file:rounded-xl file:border-0 file:text-xs file:font-bold file:bg-green-600 file:text-white hover:file:bg-green-700 cursor:pointer">
                    </div>

                    <div class="p-4 bg-green-50 rounded-2xl border border-green-100">
                        <span class="block text-[10px] font-bold text-green-500 uppercase">Waktu Selesai (Auto)</span>
                        <p id="jamKeluarDisplay" class="font-bold text-slate-700">-- : -- WIB</p>
                    </div>

                    <button onclick="kirimData()" id="btnKirim"
                        class="w-full bg-slate-900 hover:bg-black text-white font-bold py-5 rounded-2xl shadow-xl transition-all transform active:scale-[0.98]">
                        <span id="btnText">KONFIRMASI SELESAI</span>
                    </button>
                </div>
            </div>

            <div id="success" class="hidden text-center py-10">
                <div class="w-24 h-24 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6 text-4xl shadow-inner">
                    ✓
                </div>
                <h2 class="text-2xl font-black text-slate-800">DATA TERSIMPAN!</h2>
                <p class="text-sm text-slate-500 mt-2 px-4">Laporan manifest berhasil masuk ke Spreadsheet PT TAL.</p>
                <button onclick="location.reload()" class="mt-10 text-blue-600 font-bold hover:underline text-sm uppercase tracking-widest">Input Tugas Baru</button>
            </div>
        </div>
    </div>

    <script>
        // LINK SCRIPT KAMU SUDAH SAYA PASANG DI SINI
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyLfD9sVVUgxnWGcgw9tE9NClVluCjF1DKqZLDtvrzBfuA8EAjBQSNgtSc7rUwi2v520A/exec";

        window.onload = function() {
            updateTime('jamMasuk');
            getGPS();
        };

        function updateTime(id) {
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0') + " WIB";
            const el = document.getElementById(id);
            if(el) el.value = timeStr;
            return timeStr;
        }

        function getGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    document.getElementById('lokasiMasuk').value = pos.coords.latitude.toFixed(5) + ", " + pos.coords.longitude.toFixed(5);
                }, () => {
                    document.getElementById('lokasiMasuk').value = "GPS Tidak Aktif";
                });
            }
        }

        function keTahap2() {
            const cust = document.getElementById('customer').value;
            const foto = document.getElementById('fotoMasuk').files[0];

            if (!cust) return alert("Silakan isi Nama Customer!");
            if (!foto) return alert("Silakan ambil foto kedatangan!");

            document.getElementById('labelCust').innerText = cust;
            document.getElementById('page1').classList.add('hidden');
            document.getElementById('page2').classList.remove('hidden');
            document.getElementById('jamKeluarDisplay').innerText = updateTime();
        }

        function kirimData() {
            const foto2 = document.getElementById('fotoKeluar').files[0];
            if (!foto2) return alert("Silakan ambil foto bukti selesai!");

            const btn = document.getElementById('btnKirim');
            const btnText = document.getElementById('btnText');
            
            btn.disabled = true;
            btnText.innerHTML = '<span class="loader"></span> MENGIRIM...';

            const payload = {
                customer: document.getElementById('customer').value,
                waktu_datang: document.getElementById('jamMasuk').value,
                waktu_selesai: updateTime(),
                lokasi: document.getElementById('lokasiMasuk').value
            };

            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors', // Untuk menghindari masalah CORS di beberapa browser HP
                body: JSON.stringify(payload)
            })
            .then(() => {
                document.getElementById('page2').classList.add('hidden');
                document.getElementById('success').classList.remove('hidden');
            })
            .catch((err) => {
                alert("Terjadi kesalahan koneksi. Pastikan internet aktif.");
                btn.disabled = false;
                btnText.innerText = "COBA LAGI";
            });
        }
    </script>
</body>
</html>
