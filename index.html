<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PT TAL - Manifest</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4 flex items-center justify-center">

    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl overflow-hidden border">
        <div class="bg-slate-900 p-6 text-white text-center">
            <h1 class="text-lg font-bold uppercase tracking-widest">PT TAL SARANA LOGISTIK</h1>
        </div>

        <div class="p-6" id="form-container">
            <div id="page1">
                <input type="text" id="customer" class="w-full border p-4 rounded-xl mb-4" placeholder="Nama Customer (Caption)">
                <input type="file" id="fotoMasuk" accept="image/*" capture="camera" class="w-full mb-4 text-sm">
                <div class="flex justify-between text-[10px] bg-gray-50 p-2 rounded mb-4">
                    <span id="jamMasukDisp"></span>
                    <span id="gpsDisp">Mencari GPS...</span>
                </div>
                <button onclick="keTahap2()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl">MULAI TUGAS</button>
            </div>

            <div id="page2" class="hidden">
                <h2 id="custName" class="text-center font-bold mb-4"></h2>
                <input type="file" id="fotoKeluar" accept="image/*" capture="camera" class="w-full mb-4 text-sm">
                <button onclick="kirimData()" id="btnKirim" class="w-full bg-green-600 text-white font-bold py-4 rounded-xl">SELESAI & UPLOAD</button>
            </div>

            <div id="success" class="hidden text-center py-10 text-green-600 font-bold">
                DATA BERHASIL MASUK SPREADSHEET!
                <br><button onclick="location.reload()" class="mt-4 text-blue-600 underline">Input Lagi</button>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwqJBh5-otMBVRFX2Is13PVmcWRRJ2hca9OCzQIQNRyWgXxXtxTxdfO5SiVDLnBxisH7A/exec";
        let jamMasuk = "";

        window.onload = function() {
            const now = new Date();
            jamMasuk = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            document.getElementById('jamMasukDisp').innerText = "Jam: " + jamMasuk;
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(p => {
                    document.getElementById('gpsDisp').innerText = p.coords.latitude.toFixed(5) + "," + p.coords.longitude.toFixed(5);
                });
            }
        };

        function keTahap2() {
            if(!document.getElementById('customer').value || !document.getElementById('fotoMasuk').files[0]) return alert("Isi nama customer & ambil foto!");
            document.getElementById('custName').innerText = document.getElementById('customer').value;
            document.getElementById('page1').classList.add('hidden');
            document.getElementById('page2').classList.remove('hidden');
        }

        function kirimData() {
            if(!document.getElementById('fotoKeluar').files[0]) return alert("Ambil foto selesai!");
            
            const btn = document.getElementById('btnKirim');
            btn.innerText = "MENGIRIM...";
            btn.disabled = true;

            const payload = {
                customer: document.getElementById('customer').value,
                waktu_datang: jamMasuk,
                waktu_selesai: new Date().getHours().toString().padStart(2, '0') + ":" + new Date().getMinutes().toString().padStart(2, '0'),
                lokasi: document.getElementById('gpsDisp').innerText
            };

            // Gunakan Fetch dengan mode 'no-cors' agar tidak terhambat keamanan browser
            fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                cache: "no-cache",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            }).then(() => {
                document.getElementById('page2').classList.add('hidden');
                document.getElementById('success').classList.remove('hidden');
            }).catch(e => {
                alert("Gagal koneksi!");
                btn.disabled = false;
                btn.innerText = "SELESAI & UPLOAD";
            });
        }
    </script>
</body>
</html>
